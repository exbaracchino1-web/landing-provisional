<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En construcción</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            /* Eliminamos overflow: hidden para evitar bloqueos en móviles si el contenido crece */
            background-color: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .background-container {
            position: relative;
            min-height: 100vh; /* Usa el 100% de la altura de la pantalla */
            width: 100%;
            /* Capa de fondo con la imagen y el gradiente */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('portada.jpg') no-repeat center center;
            background-size: cover; /* Cambiamos a cover para que siempre rellene la pantalla */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            max-width: 450px;
            width: 100%;
        }

        h1 { font-size: 2.2rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 1.1rem; margin-bottom: 30px; opacity: 0.9; }

        .btn-info {
            display: inline-block;
            padding: 14px 35px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-info:hover { 
            transform: scale(1.05); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); 
        }

        /* --- AJUSTE PARA MÓVILES --- */
        @media (max-width: 480px) {
            .content {
                padding: 30px 20px;
            }
            h1 { font-size: 1.7rem; }
            p { font-size: 1rem; }
            
            .background-container {
                /* En móviles muy estrechos, 'cover' es mejor que 'contain' 
                   porque evita los bordes blancos/negros vacíos */
                background-size: cover; 
            }
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="content">
            <h1>Próximamente</h1>
            <p>Estamos preparando la nueva web de <strong>Aparkout</strong>.</p>
            <a href="mailto:info@aparkout.com" class="btn-info">SOLICITAR INFO</a>
        </div>
    </div>
</body>
</html>
