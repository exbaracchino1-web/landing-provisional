<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En construcción</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Fondo negro por si la imagen tarda en cargar */
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Filtro oscuro para que el texto resalte */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('portada.jpg') no-repeat center center;
            background-size: cover; 
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- AJUSTE PARA MÓVILES --- */
        @media (max-width: 768px) {
            .background-container {
                /* "contain" hace que la foto se vea entera sin recortarse */
                background-size: contain; 
                background-color: #f4f4f4; /* O el color de fondo de tu imagen */
            }
            .content {
                width: 90%;
                padding: 20px;
            }
            h1 { font-size: 1.8rem; }
        }

        .content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-family: Arial, sans-serif;
            max-width: 500px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 1.1rem; margin-bottom: 25px; opacity: 0.9; }

        .btn-info {
            display: inline-block;
            padding: 12px 30px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-info:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="content">
            <h1>Próximamente</h1>
            <p>Estamos preparando la nueva web.</p>
            <a href="mailto:info@aparkout.com" class="btn-info">SOLICITAR INFO</a>
        </div>
    </div>
</body>
</html>
